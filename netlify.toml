[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command    = "npm run dev"
  framework  = "vite"
  targetPort = 5173
  port       = 8888
  autoLaunch = false

# Expose la function sous /search (contrat front)
[[redirects]]
  from = "/search"
  to = "/.netlify/functions/search"
  status = 200

# Expose la function sous /decompose (décomposition de requête)
[[redirects]]
  from = "/decompose"
  to = "/.netlify/functions/decompose"
  status = 200

# Expose la function sous /survey (vue détail d'un sondage)
[[redirects]]
  from = "/survey"
  to = "/.netlify/functions/survey"
  status = 200

# Fallback SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
