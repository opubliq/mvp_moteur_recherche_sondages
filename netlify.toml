[build]
  command       = "npm run build"
  publish       = "dist"
  functions     = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"

# microdata embarque DuckDB (binding natif .node) : esbuild ne peut pas le bundler.
# On l'externalise et on force l'inclusion du binaire natif dans le paquet Lambda.
[functions."microdata"]
  external_node_modules = ["@duckdb/node-api", "@duckdb/node-bindings"]
  included_files = [
    "node_modules/@duckdb/node-api/**",
    "node_modules/@duckdb/node-bindings/**",
    "node_modules/@duckdb/node-bindings-linux-x64/**",
  ]

[dev]
  command    = "npm run dev"
  framework  = "vite"
  targetPort = 5173
  port       = 8888
  autoLaunch = false

# Expose la function sous /search (contrat front)
[[redirects]]
  from = "/search"
  to = "/.netlify/functions/search"
  status = 200

# Expose la function sous /decompose (décomposition de requête)
[[redirects]]
  from = "/decompose"
  to = "/.netlify/functions/decompose"
  status = 200

# Expose la function sous /survey (vue détail d'un sondage)
[[redirects]]
  from = "/survey"
  to = "/.netlify/functions/survey"
  status = 200

# Expose la function sous /surveys (liste macro pour l'onglet Exploration)
[[redirects]]
  from = "/surveys"
  to = "/.netlify/functions/surveys"
  status = 200

# Expose la function sous /themes (exploration thématique : facettes + browse)
[[redirects]]
  from = "/themes"
  to = "/.netlify/functions/themes"
  status = 200

# Expose la function sous /open-questions (catalogue des questions à réponses libres)
[[redirects]]
  from = "/open-questions"
  to = "/.netlify/functions/open-questions"
  status = 200

# Expose la function sous /verbatims (réponses libres d'une question : BM25 + rerank)
[[redirects]]
  from = "/verbatims"
  to = "/.netlify/functions/verbatims"
  status = 200

# Expose la function sous /annotate (annotation LLM d'un paquet de réponses libres)
[[redirects]]
  from = "/annotate"
  to = "/.netlify/functions/annotate"
  status = 200

# Expose la function sous /microdata (distributions & crosstabs DuckDB sur Parquet)
[[redirects]]
  from = "/microdata"
  to = "/.netlify/functions/microdata"
  status = 200

# Expose la function sous /microdata-manifest (liste des sondages à micro-données)
[[redirects]]
  from = "/microdata-manifest"
  to = "/.netlify/functions/microdata-manifest"
  status = 200

# Expose la function sous /agent (boucle tool-use analytique — bead aat.1)
[[redirects]]
  from = "/agent"
  to = "/.netlify/functions/agent"
  status = 200

# Fallback SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
